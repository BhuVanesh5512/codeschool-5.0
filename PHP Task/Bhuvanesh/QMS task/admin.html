
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QMS Admin Panel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #f5f7fb;
      font-family: "Segoe UI", sans-serif;
    }

    .sidebar {
      background: #fff;
      min-height: 100vh;
      border-right: 1px solid #e9ecef;
    }

    .nav-link {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      color: #333;
      transition: 0.2s;
    }

    .nav-link:hover {
      background: #eef3ff;
    }

    .nav-link.active {
      background: linear-gradient(135deg, #000000, #000000);
      color: #fff !important;
      box-shadow: 0 4px 12px rgba(174, 206, 255, 0.25);
    }

    #sectionContent {
      min-height: 500px;
    }

    .card {
      border-radius: 14px;
    }

    .navbar {
      background: linear-gradient(135deg, #0f0f0f, #000000);
    }

    .modal-content {
      border-radius: 16px;
      overflow: hidden;
    }

    .btn {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold ps-2">QuizSt⭐r Admin</a>
    <button id="logoutBtn" class="btn btn-outline-light">Logout</button>
  </div>
</nav>


<div class="container-fluid">
  <div class="row">

    
    <div class="col-md-3 col-lg-2 sidebar p-3">
      <h5 class="fw-bold">Manage</h5>

      <ul class="nav flex-column">
        <li><a class="nav-link active" href="#" data-section="dashboard">Dashboard</a></li>
        <li><a class="nav-link" href="#" data-section="subjects">Subjects</a></li>
        <li><a class="nav-link" href="#" data-section="quizzes">Quizzes</a></li>
      </ul>
    </div>


    <div class="col-md-9 col-lg-10 p-4">
      <div id="sectionContent" class="bg-white shadow-sm rounded-4 p-4">
        <h3>Welcome Admin</h3>
        <p>Select a section from sidebar</p>
      </div>
    </div>

  </div>
</div>


<div class="modal fade" id="crudModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header text-white">
        <h5 class="modal-title" id="crudTitle">Manage</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="crudForm"></form>
      </div>

      <div class="modal-footer">
        <button id="saveBtn" class="btn btn-success">Save</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>

    </div>
  </div>
</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="./scripts/admin.js"></script>

</body>
</html>
