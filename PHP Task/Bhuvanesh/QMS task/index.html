<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      body {
        background-image: url(./styles/assets/index.jpg);
        background-size: cover;
        background-attachment: fixed;
        background-repeat: none;
      }
      .bg-lowOpasity {
        background-color: rgba(251, 245, 245, 0.58);
      }
    </style>
  </head>
  <body class="vh-100 w-100">
    <div class="container w-100">
      <div class="row vh-100 justify-content-center align-items-center">
        <div class="col-10 col-md-8 col-lg-6" id="transferContainer">
          <div class="card bg-lowOpasity px-5 py-4 shadow-lg rounded-pill">
            <div class="w-100 d-flex justify-content-center align-items-center">
              <p class="display-6 fw-bold justify-content-start mb-0">Login</p>
            </div>
            <form class="p-2 emailForm">
              <div class="form-floating m-3">
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  aria-describedby="email"
                />
                <label for="email" class="form-label text-dark">Email</label>
              </div>
              <p id="emailError" class="d-none text-danger m-0"></p>

              <div
                class="w-100 d-flex justify-content-center align-items-center"
              >
                <button type="submit" class="btn btn-dark text-white px-5">
                  <b>Verify Email</b>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./scripts/index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
