<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-md bg-light shadow-sm">
      <div class="container-fluid">
        <a class="navbar-brand fs-4 fw-bold text-primary" href="#">QuizSt⭐R</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul
            class="navbar-nav me-auto mb-2 mb-md-0 align-items-center"
            id="subjectNav"
          >
            <li class="nav-item">
              <a class="nav-link fw-semibold" href="./home.html">
                <i class="bi bi-house-door-fill me-1"></i> Home
              </a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle fw-semibold"
                href="#"
                id="subjectsDropdown"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-journal-bookmark-fill me-1"></i> Subjects
              </a>
              <ul
                class="dropdown-menu shadow-sm border-0 rounded-3"
                aria-labelledby="subjectsDropdown"
              ></ul>
            </li>
          </ul>

          <form class="d-flex me-4 d-none" role="search">
            <div class="input-group">
              <input
                class="form-control border-primary"
                type="search"
                placeholder="Search quizzes..."
                aria-label="Search"
                id="quizSearch"
              />
              <button class="btn btn-primary" type="button" id="searchBtn">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </form>

          <div
            class="d-flex align-items-center position-relative"
            id="profileWrapper"
          >
            <a href="#" class="nav-link me-2">
              <i
                class="bi bi-person-circle fs-4 text-secondary"
                id="profileIcon"
                style="cursor: pointer"
              ></i>
            </a>

            <button class="btn btn-danger btn-sm logoutBtn">
              <i class="bi bi-box-arrow-right me-1"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </nav>

    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
