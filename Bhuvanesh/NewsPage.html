<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <link rel="stylesheet" href="./styles/NewsPage.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="vh-100 m-0 p-0">
    <div class="container-fluid d-flex flex-column m-0 p-0">
      <div class="row w-100" style="height: 45px">
        <div class="col-12">
          <nav
            class="navbar navbar-expand-lg bg-white align-items-center fixed-top"
          >
            <div
              class="container-fliud d-flex justify-content-between align-items-center w-100"
            >
              <div
                class="hstack navbar-brand gap-3 d-flex align-content-center"
              >
                <div class="ms-2">
                  <p class="text-danger display-6 fw-bold">Buletin</p>
                </div>
                <div
                  class="vr"
                  style="height: 35px; opacity: 1; margin: 8px 0px 3px 0px"
                ></div>
              </div>
              <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="undefined"
                aria-label="Toggle navigation"
              >
                <span class="navbar-toggler-icon"></span>
              </button>
              <div
                class="collapse navbar-collapse d-flex justify-content-between w-100 align-items-center"
                id="navbarSupportedContent"
              >
                <div>
                  <ul class="navbar-nav me-auto mb-lg-0 text-dark">
                    <li class="nav-item">
                      <a
                        class="nav-link"
                        aria-current="page"
                        href="#stories"
                        class="text-dark"
                        >Stories</a
                      >
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#creator" class="text-dark"
                        >Creator</a
                      >
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#community" class="text-dark"
                        >Community</a
                      >
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="#Subscribe" class="text-dark"
                        >Subscribe</a
                      >
                    </li>
                  </ul>
                </div>
                <div
                  class="d-flex flex-row justify-content-around w-25 align-items-center"
                >
                  <div>
                    <button class="btn btn-danger me-2" id="logoutBtn">
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        fill="currentColor"
                        class="bi bi-box-arrow-right"
                        viewBox="0 0 16 16"
                      >
                        <path
                          fill-rule="evenodd"
                          d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"
                        />
                        <path
                          fill-rule="evenodd"
                          d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"
                        /></svg
                      ><span>Logout</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </nav>
        </div>
      </div>
      <div class="row justify-content-center" style="margin: 45px">
        <div
          class="col-11 border bg-secondary-subtle rounded-pill text-center p-5"
        >
          <p class="display-6 text-center">Welcome to craft Buletin</p>
          <p class="display-5">Craft narrative 📝that ignite inspiration💡</p>
          <p class="display-4">Knowledge📕 & Entertainment 🎶</p>
        </div>
      </div>
      <div class="row justify-content-center">
        <div class="col justify-content-around">
          <div
            class="main-content d-flex justify-content-center w-100 flex-wrap gap-3 w-100"
            id="mainContent"
          ></div>
        </div>
      </div>
    </div>
    <script
      src="https://code.jquery.com/jquery-4.0.0.js"
      integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/NewsPage.js"></script>
  </body>
</html>
